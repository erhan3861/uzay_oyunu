  <!--
    ============================================================================
    DİNAMİK BAZ ADRESİ (BASE URL) AYARLAYICISI
    ============================================================================
    Bu kod bloğu, index2.html başka bir sunucuda çalışırken diğer tüm CSS, JS,
    görsel ve 3D model dosyalarının GitHub üzerindeki deponuzdan yüklenmesini sağlar.

    Kullanım Seçenekleri:
    1. YOL (Tavsiye Edilen - Ayar Gerektirmez): 
       Dosyayı sunucunuza yükledikten sonra URL sonuna "?base=GITHUB_PAGES_LINKI" ekleyebilirsiniz.
       Örn: https://siteniz.com/index2.html?base=https://kullaniciadi.github.io/depo-adi/

    2. YOL (Statik Ayar):
       Aşağıdaki CONFIG_BASE_URL değişkeninin içerisine GitHub Pages veya jsDelivr linkinizi yazın.
       Örn: const CONFIG_BASE_URL = "https://kullaniciadi.github.io/depo-adi/";
  -->
  <script>
    (function() {
      // Buraya GitHub deponuzun Pages linkini veya jsDelivr CDN linkini yazabilirsiniz:
      const CONFIG_BASE_URL = "https://erhan3861.github.io/3d_egitim_oyunu/"; 

      const urlParams = new URLSearchParams(window.location.search);
      const queryBase = urlParams.get('base');
      let finalBaseUrl = queryBase || CONFIG_BASE_URL;

      if (finalBaseUrl) {
        if (!finalBaseUrl.endsWith('/')) {
          finalBaseUrl += '/';
        }
      } else {
        // Eğer hiçbir adres belirtilmemişse, local/aynı klasör mantığıyla çalışır.
        finalBaseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
      }

      // Dinamik <base> tag'i eklenerek altındaki tüm göreli linklerin
      // GitHub sunucusu üzerinden çekilmesi sağlanır.
      const baseTag = document.createElement('base');
      baseTag.href = finalBaseUrl;
      document.head.appendChild(baseTag);

      console.log("[Antigravity] Kaynaklar şu base adresten yükleniyor:", finalBaseUrl);
    })();
  </script>
